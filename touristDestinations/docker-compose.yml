version: '3.9'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: mysql:8.0  # Or mysql:5.7 if your project is very old
    # This ensures data persists even if you stop the container
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: destinations  # Must match NAME in settings.py
      MYSQL_ROOT_PASSWORD: rootpassword  # Set a password
    ports:
      - "3306:3306"  # Optional: only if you want to connect via Workbench on your host

volumes:
  mysql_data:
